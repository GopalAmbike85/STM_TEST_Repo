name: STM32 Firmware Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM GNU Toolchain
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-arm-none-eabi make python3

      - name: Fix Windows paths in all Makefiles
        run: |
          python3 - <<'EOF'
          import os, re

          root = "STM32CubeIDE/Debug"
          win_prefix = "D:/ST/MC/ChannelRobotics_150626_1/"

          for dirpath, dirs, files in os.walk(root):
              for fname in files:
                  if fname.endswith(".mk") or fname == "makefile" or fname == "Makefile":
                      fpath = os.path.join(dirpath, fname)
                      with open(fpath, "r", errors="replace") as f:
                          content = f.read()
                      # Replace Windows prefix with empty string (leaves relative path)
                      fixed = content.replace(win_prefix, "../../")
                      # Fix Windows CRLF line endings
                      fixed = fixed.replace("\r\n", "\n")
                      with open(fpath, "w") as f:
                          f.write(fixed)
                      print(f"Fixed: {fpath}")
          EOF

      - name: Build firmware
        run: |
          cd STM32CubeIDE/Debug
          make -j$(nproc) all

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: STM32CubeIDE/Debug/*.elf
