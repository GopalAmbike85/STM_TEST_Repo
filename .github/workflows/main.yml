name: STM32 Firmware Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM GNU Toolchain (15.1)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-arm-none-eabi make

      - name: Show problematic subdir.mk line
        run: sed -n '60,66p' STM32CubeIDE/Debug/Middlewares/MotorControl/subdir.mk

      - name: Build firmware
        run: |
          cd STM32CubeIDE/Debug
          make -j$(nproc) all

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: STM32CubeIDE/Debug/*.elf
