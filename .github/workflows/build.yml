name: STM32 Firmware Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM GNU Toolchain
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-arm-none-eabi make python3

      - name: Fix Windows paths in all Makefiles and dependency files
        run: |
          python3 - <<'EOF'
          import os

          root = "STM32CubeIDE/Debug"
          replacements = [
              ("D:/ST/MC/ChannelRobotics_150626_1/MCSDK_v6.4.2-Full/", "../../MCSDK_v6.4.2-Full/"),
              ("D:/ST/MC/ChannelRobotics_150626_1/Drivers/", "../../Drivers/"),
              ("D:/ST/MC/ChannelRobotics_150626_1/", "../../"),
              ("D:/Git/Test/STM_TEST_Repo/MCSDK_v6.4.2-Full/", "../../MCSDK_v6.4.2-Full/"),
              ("D:/Git/Test/STM_TEST_Repo/Drivers/", "../../Drivers/"),
              ("D:/Git/Test/STM_TEST_Repo/", "../../"),
              ("D:\\Git\\Test\\STM_TEST_Repo\\STM32CubeIDE\\", "../"),
          ]

          extensions = (".mk", ".d", ".list")
          filenames = ("makefile", "Makefile", "objects.mk", "sources.mk")

          for dirpath, dirs, files in os.walk(root):
              for fname in files:
                  if fname.endswith(extensions) or fname in filenames:
                      fpath = os.path.join(dirpath, fname)
                      with open(fpath, "r", errors="replace") as f:
                          content = f.read()
                      fixed = content.replace("\r\n", "\n")
                      for win_path, linux_path in replacements:
                          fixed = fixed.replace(win_path, linux_path)
                      with open(fpath, "w") as f:
                          f.write(fixed)
                      print(f"Fixed: {fpath}")
          EOF

      - name: Build firmware
        run: |
          cd STM32CubeIDE/Debug
          make -j$(nproc) all

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: STM32CubeIDE/Debug/*.elf
